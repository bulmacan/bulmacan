  <script>
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || 'index.html';
    const date = params.get('date') || 'today';
    const nextPage = `${next}?date=${encodeURIComponent(date)}`;

    let seconds = 10;
    let redirected = false;
    const countdownEl = document.getElementById('countdown');

    function redirect() {
      if (!redirected) {
        redirected = true;
        window.location.href = nextPage;
      }
    }

    const timer = setInterval(() => {
      seconds--;
      countdownEl.textContent = `Gruplamaca Yükleniyor: ${seconds} saniye`;
      if (seconds <= 0) {
        clearInterval(timer);
        redirect();
      }
    }, 1000);

    document.getElementById('adVideo').addEventListener('ended', () => {
      clearInterval(timer);
      redirect();
    });

    // Fallback in case video doesn't play or countdown fails
    setTimeout(() => {
      redirect();
    }, 11000);
  </script>
