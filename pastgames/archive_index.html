<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kümelemece</title>

  <!-- Footer CSS -->
  <link rel="stylesheet" href="https://www.bulmacan.com/footer/footer.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      background: white;
      min-height: 60vh;
    }

    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- 🔺 SMART HEADER -->
  <div id="smart-header"></div>
  <script src="https://www.bulmacan.com/header/load_header.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof loadHeader === "function") {
        loadHeader("home");
      }
    });
  </script>

  <!-- MAIN CONTENT -->
  <main id="content">
    <p>Yükleniyor...</p>
  </main>

  <!-- 🔻 SMART FOOTER -->
  <div id="smart-footer"></div>
  <script src="https://www.bulmacan.com/footer/load_footer.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof loadFooter === "function") {
        loadFooter();
      }
    });
  </script>

  <!-- MAIN APP -->
<script>
  function getDateFromUrl() {
    const parts = window.location.pathname.split("/").filter(Boolean);
    const last = parts[parts.length - 1];

    if (/^\d{4}-\d{2}-\d{2}$/.test(last)) {
      return last;
    }

    return null;
  }

  async function loadPuzzle() {
    const date = getDateFromUrl();

    if (!date) {
      document.getElementById("content").innerHTML =
        `<p>📅 Geçerli bir tarih bulunamadı</p>`;
      return;
    }

    const url = `/kumelemece/data/${date}.json`;

    try {
      const res = await fetch(url);

      if (!res.ok) {
        throw new Error("JSON bulunamadı");
      }

      const data = await res.json();
      renderPuzzle(data);

    } catch (err) {
      console.error("LOAD ERROR:", err);
      document.getElementById("content").innerHTML =
        `<p class="error">⚠️ ${date} için veri bulunamadı</p>`;
    }
  }

  function renderPuzzle(data) {
    const container = document.getElementById("content");

    container.innerHTML = `
      <h2>${data.title || "Günün Bulmacası"}</h2>
      <pre>${JSON.stringify(data, null, 2)}</pre>
    `;
  }

  loadPuzzle();
</script>

</body>
</html>
