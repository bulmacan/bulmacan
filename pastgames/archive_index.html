<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bulmacan – Bulmaca Arşivi</title>
<meta name="description" content="Bulmacan arşivinde geçmiş kelime avı, sudoku ve diğer bulmacaları keşfedin.">
<meta name="robots" content="index, follow">

<link rel="icon" href="/icons/favicon.ico">

<style>

/* RESET */
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f8f9fb;
  color:#222;
}

/* LAYOUT */
.container{
  max-width:1100px;
  margin:auto;
  padding:30px 16px;
}

/* TITLE */
h1{
  margin-bottom:8px;
}

p{
  margin-top:0;
  color:#666;
}

/* GRID */
.archive-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-top:20px;
}

/* BOX */
.archive-box{
  background:white;
  padding:16px;
  border-radius:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  transition:transform 0.2s ease;
}

.archive-box:hover{
  transform:translateY(-3px);
}

.archive-box h2{
  margin-top:0;
  font-size:18px;
}

/* LIST */
.archive-box ul{
  list-style:none;
  padding:0;
  margin:0;
}

.archive-box li{
  margin-bottom:10px;
}

/* LINKS */
.archive-box a{
  text-decoration:none;
  color:#2c5cff;
  font-size:14px;
}

.archive-box a:hover{
  text-decoration:underline;
}

/* AD */
.ad-container{
  max-width:720px;
  margin:40px auto 20px auto;
  padding:16px;
  text-align:center;
  border:1px solid #eee;
  background:#fafafa;
  border-radius:8px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div id="smart-header"></div>
<script src="/header/load_header.js" defer></script>

<!-- AD -->
<div class="ad-container">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1329536784333556"
crossorigin="anonymous"></script>
</div>

<div class="container">

<h1>Bulmaca Arşivi</h1>
<p>Geçmiş bulmacaları keşfedin ve çözmeye devam edin.</p>

<div class="archive-grid">

  <div class="archive-box">
    <h2>Kümelemece</h2>
    <ul id="archive-kumelemece"></ul>
  </div>

  <div class="archive-box">
    <h2>Sudoku</h2>
    <ul id="archive-sudoku"></ul>
  </div>

  <div class="archive-box">
    <h2>Sembollemece</h2>
    <ul id="archive-sembol"></ul>
  </div>

  <div class="archive-box">
    <h2>Kelime Avı</h2>
    <ul id="archive-kelime"></ul>
  </div>

</div>

</div>

<!-- FOOTER -->
<div id="smart-footer"></div>
<script src="/footer/load_footer.js" defer></script>

<script>

/* FORMAT DATE (TR) */
function formatTurkishDate(dateStr){

  const months=[
    "Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
    "Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"
  ];

  const d=new Date(dateStr+"T00:00:00");
  return d.getDate()+" "+months[d.getMonth()]+" "+d.getFullYear();
}

/* GLOBAL DATA */
let archiveData=null;

/* LOAD ALL ARCHIVES */
async function loadAllArchives(){

  try{

    const res=await fetch("archive_index.json");
    archiveData=await res.json();

    loadArchive("kumelemece","archive-kumelemece");
    loadArchive("sudoku","archive-sudoku");
    loadArchive("sembollemece","archive-sembol");
    loadArchive("kelimeavi","archive-kelime");

  }catch(e){

    console.error("Archive load error:", e);

    document.querySelectorAll(".archive-box ul").forEach(el=>{
      el.innerHTML="<li>Arşiv yüklenemedi.</li>";
    });

  }

}

/* LOAD SINGLE CATEGORY */
function loadArchive(type,listId){

  const list=document.getElementById(listId);
  const items=archiveData[type];

  if(!items || items.length===0){
    list.innerHTML="<li>Henüz bulmaca yok.</li>";
    return;
  }

  items
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,8)
    .forEach(item=>{

      const li=document.createElement("li");
      const a=document.createElement("a");

      a.href=`/${type}/${item.slug}`;
      a.textContent=formatTurkishDate(item.date);

      li.appendChild(a);
      list.appendChild(li);

    });

}

/* INIT */
loadAllArchives();

</script>

</body>
</html>
