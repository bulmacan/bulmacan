<body>
  <!-- 🔺 External Smart Header -->
<div id="smart-header"></div>
<script src="https://www.bulmacan.com/header/load_header.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadHeader("back");
  });
</script>



  <!-- Countdown element (required!) -->
  <div id="countdown">Kelime Avı Yükleniyor: 10 saniye</div>
  <br><br><br>

<script>
  const params = new URLSearchParams(window.location.search);
  const nextPage = decodeURIComponent(params.get("next") || "index.html");
  const date = params.get("date");   // ✅ ADD THIS

  let seconds = 10;
  let redirected = false;
  const countdownEl = document.getElementById("countdown");

  function redirect() {
    if (!redirected) {
      redirected = true;

      if (date) {
        window.location.href = `${nextPage}?date=${date}`;
      } else {
        window.location.href = nextPage;
      }
    }
  }

  const timer = setInterval(() => {
    seconds--;
    if (countdownEl) {
      countdownEl.textContent = `Kelime Avı Yükleniyor: ${seconds} saniye`;
    }
    if (seconds <= 0) {
      clearInterval(timer);
      redirect();
    }
  }, 1000);

  const adVideo = document.getElementById("adVideo");
  if (adVideo) {
    adVideo.addEventListener("ended", () => {
      clearInterval(timer);
      redirect();
    });
  }

  setTimeout(() => {
    redirect();
  }, 11000);
</script>

</body>
</html>
