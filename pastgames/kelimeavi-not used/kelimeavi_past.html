 <div id="smart-header"></div>

  <!-- 🧩 Puzzle Info -->
  <div id="subject">🗺️ Bugünkü konu: <strong id="puzzleTitle">Yükleniyor...</strong></div>
  <div id="progress" style="font-size: 1.2em; font-weight: bold; margin-top: 10px; color: #2e7d32;">
    0 bulundu
  </div>

  <!-- 🔡 Puzzle Grid -->
  <div id="game-container">
    <div id="grid"></div>
    <svg id="overlay"></svg>
  </div>

  <!-- 💬 Feedback -->
  <div id="feedback"></div>

<div id="smart-footer"></div>
<link rel="stylesheet" href="https://www.bulmacan.com/footer/footer.css">

<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadFooter();
  });
</script>


  <!-- 🔧 Load Puzzle from JSON -->
  <script>
    let foundWords = 0;
    let totalWords = 0;
    let puzzle = null;

    const urlParams = new URLSearchParams(window.location.search);
    const selectedDate = urlParams.get("date");

    if (!selectedDate) {
      document.getElementById("puzzleTitle").textContent =
        "Bulmaca tarihi belirtilmedi. Lütfen arşivden bir tarih seçerek tekrar deneyin.";
      document.getElementById("progress").style.display = "none";
      document.getElementById("game-container").style.display = "none";
      throw new Error("Missing date parameter in URL");
    }

    fetch("/kelimeavi/kelimeavi_data.json")
      .then(res => {
        if (!res.ok) throw new Error("JSON file not found or inaccessible");
        return res.json();
      })
      .then(data => {
        puzzle = data.puzzles.find(p => p.date === selectedDate);

        if (!puzzle) {
          document.getElementById("puzzleTitle").textContent =
            "Bu tarihte bir bulmaca bulunamadı. Belki eşek başka bir yoldan gitmiştir.";
          document.getElementById("progress").style.display = "none";
          document.getElementById("game-container").style.display = "none";
          return;
        }

        const matrix = puzzle.matrix;
        const words = puzzle.words;
        totalWords = words.length;

        document.getElementById("puzzleTitle").textContent =
          `${puzzle.emojiClue || ""} ${puzzle.title}`;
console.log("Matrix:", matrix);
console.log("Words:", words);
console.log("initializePuzzle exists:", typeof initializePuzzle);

if (typeof initializePuzzle === "function") {
  initializePuzzle(matrix, words, handleWordFound);
} else {
  console.warn("initializePuzzle function not found.");
}
      })
      .catch(err => {
        document.getElementById("puzzleTitle").textContent =
          "Veri yüklenemedi: " + err.message;
        console.error("Fetch error:", err);
      });

    // ✅ Success logic
    function handleWordFound() {
      foundWords++;
      document.getElementById("progress").textContent = `${foundWords} bulundu`;

      if (foundWords === totalWords && puzzle) {
        document.getElementById("game-container").style.display = "none";

        const wordList = puzzle.words.map(word => word.toUpperCase()).join(', ');

        document.getElementById("feedback").innerHTML = `
          <div style="font-size: 1em; font-weight: bold; color: #2e7d32; margin-top: 20px;">
            <span style="font-size: 2em;">🎉</span> Tüm kelimeleri buldunuz!
          </div>
          <p>${wordList}</p>
          <div style="margin-top: 15px;">
    <a href="https://www.facebook.com/sharer/sharer.php?u=https://bulmacan.com"
               target="_blank"
               style="display: inline-block; padding: 10px 20px; background-color: #4267B2; color: white; border-radius: 6px; text-decoration: none; font-weight: bold;">
              📣Bulmacaları beğendiniz mi?<br>
              Facebook’da bizi önermek için tıklayın<br>daha çok oyuncu, daha çok bulmaca!😊
            </a>
          </div>
        `;
      }
    }
  </script>
