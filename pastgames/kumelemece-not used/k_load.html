<script>
  const params = new URLSearchParams(window.location.search);
  const nextPage = "kumelemece_past.html";
  const date = params.get("date");

  function addParam(url, key, value) {
    if (!value) return url;
    const sep = url.includes('?') ? '&' : '?';
    return `${url}${sep}${key}=${encodeURIComponent(value)}`;
  }

  const fullRedirect = addParam(nextPage, 'date', date);

  let seconds = 10;
  let redirected = false;
  const countdownEl = document.getElementById('countdown');

  function redirect() {
    if (!redirected) {
      redirected = true;
      window.location.href = fullRedirect;
    }
  }

  const timer = setInterval(() => {
    seconds--;
    if (countdownEl) {
      countdownEl.textContent = `kumelemece Yükleniyor: ${seconds} saniye`;
    }
    if (seconds <= 0) {
      clearInterval(timer);
      redirect();
    }
  }, 1000);

  document.getElementById('adVideo')?.addEventListener('ended', () => {
    clearInterval(timer);
    redirect();
  });

  setTimeout(() => {
    redirect();
  }, 11000);
</script>
