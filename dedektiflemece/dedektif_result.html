<div id="smart-header"></div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadHeader("home");

  <section class="result-section">
    <h1 id="result-header"></h1>
    <div id="result-message"></div>
    <div style="margin-top:20px;">
    </div>
  </section>

<div id="smart-footer"></div>

  <script>

const result = localStorage.getItem("result");

async function loadResultPuzzle() {

  const today = new Date();
  let puzzle = null;

  for (let i = 0; i < 3650; i++) {

    const d = new Date(today);
    d.setDate(today.getDate() - i);

    const dateStr = d.toISOString().split("T")[0];

    try {

      const res = await fetch(`/dedektiflemece/data/${dateStr}.json`);

      if (res.ok) {

        puzzle = await res.json();
        break;

      }

    } catch(e){}

  }

  if (!puzzle) return;

  const solution = puzzle.solution;

  const header = document.getElementById("result-header");
  const message = document.getElementById("result-message");

  if (result === "success") {

    header.textContent = "🎉 BRAVO!";

    message.innerHTML = `
      <p>Sırrı başarıyla çözdünüz. Zeki gurur duyuyor!</p>
      <p><strong>Suçlu:</strong> ${solution.person}</p>
      <p><strong>Olay Yeri:</strong> ${solution.place}</p>
      <p><strong>Yöntem:</strong> ${solution.method}</p>
      <p><em>${solution.how}</em></p>
    `;

  } else {

    header.textContent = "OLMADI BU SEFER";

    message.innerHTML = `
      <p>Ama bir dahaki sefere başaracaksınız!</p>
      <p><strong>Doğru Cevap:</strong></p>
      <p><strong>Suçlu:</strong> ${solution.person}</p>
      <p><strong>Olay Yeri:</strong> ${solution.place}</p>
      <p><strong>Yöntem:</strong> ${solution.method}</p>
      <p><em>${solution.how}</em></p>
    `;

  }

}

loadResultPuzzle();

</script>
