<body>

<div id="smart-header"></div>
<script src="https://www.bulmacan.com/header/load_header.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadHeader("home");
  });
</script>

<div class="content-wrapper">

<section class="clue-section">
  <div id="intro-text"></div>
  <div class="container" id="clue-box"></div>
</section>

<h3>Olası Suç Mahalleri ve Silahlar</h3>

<br><strong>Zanlılar</strong>

<form id="guess-form">
  <h3>Sırrı Çözdüm!</h3>
  <label><b>Suçlu?</b>
    <select name="person" id="person-select"></select>
  </label>

  <label><b>Yöntem?</b>
    <select name="place" id="place-select"></select>
  </label>

  <label><b>Alet?</b>
    <select name="method" id="method-select"></select>
  </label>

  <div class="submit-row">
    <button type="submit">✅ Cevabı Kontrol Et</button>
    <div id="hearts">
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
    </div>
  </div>
  <div id="feedback"></div>
</form>

    loadFooter();
  });
</script>


<script>

/********************************************
 * GLOBAL STATE
 ********************************************/
let selectedItem = null;
let activePuzzle = null;
let errors = 0;

/********************************************
 * HELPER — LOCAL DATE FORMAT
 ********************************************/
function formatDate(date) {
  return date.getFullYear() + "-" +
    String(date.getMonth() + 1).padStart(2,"0") + "-" +
    String(date.getDate()).padStart(2,"0");
}

/********************************************
 * DAILY PUZZLE LOADER (JSON PER DAY)
 ********************************************/
const params = new URLSearchParams(window.location.search);
const selectedDate = params.get("date");

async function loadPuzzle() {

  const today = new Date();
  let puzzle = null;

  /* 1️⃣ Try URL date first */
  if (selectedDate) {

    try {
      const res = await fetch(`/dedektiflemece/data/${selectedDate}.json`);
      if (res.ok) {
        puzzle = await res.json();
        console.log("Loaded specific puzzle:", selectedDate);
      }
    } catch(e){}

  }

  /* 2️⃣ Search backwards for latest puzzle */
  if (!puzzle) {

    for (let i = 0; i < 60; i++) {

      const d = new Date(today);
      d.setDate(today.getDate() - i);

      const dateStr = formatDate(d);

      try {

        const res = await fetch(`/dedektiflemece/data/${dateStr}.json`);

        if (res.ok) {

          puzzle = await res.json();
          console.log("Loaded fallback puzzle:", dateStr);
          break;

        }

      } catch(e){}

    }

  }

  if (!puzzle) {

    document.getElementById("intro-text").innerHTML =
      "<p style='color:red;'>Bulmaca bulunamadı.</p>";

    return;

  }

  activePuzzle = puzzle;
  renderPuzzle(activePuzzle);

}

loadPuzzle();

/********************************************
 * RENDER PUZZLE
 ********************************************/
function renderPuzzle(puzzle) {

  document.getElementById("intro-text").innerHTML = `<p>${puzzle.intro}</p>`;

  document.getElementById("clue-box").innerHTML =
    `<strong>İpuçları:</strong><br>` +
    puzzle.clues.map(c => `${c}<br>`).join("");

  const row = document.getElementById("location-weapon-row");
  row.innerHTML = "";

  puzzle.locations.forEach((loc, i) => {
    row.innerHTML += `
      <div class="drop-zone" id="home-person${i + 1}">
        <div class="draggable" draggable="true" id="mahal${i + 1}" data-type="location">${loc}</div>
      </div>`;
  });

  puzzle.weapons.forEach((wpn, i) => {
    row.innerHTML += `
      <div class="drop-zone" id="home-weapon${i + 1}">
        <div class="draggable" draggable="true" id="weapon${i + 1}" data-type="weapon">${wpn}</div>
      </div>`;
  });

  const matrix = document.getElementById("suspect-matrix");

  matrix.innerHTML = `
    <table class="matrix-table">
      <thead>
        <tr>
          <th>Şüpheli</th>
          <th>Olay Yeri</th>
          <th>Silah</th>
          <th>Fırsat</th>
        </tr>
      </thead>
      <tbody>
        ${puzzle.suspects.map((suspect, i) => `
          <tr>
            <td>${suspect}</td>
            <td><div class="drop-zone" id="zanli${i + 1}-mahal"></div></td>
            <td><div class="drop-zone" id="zanli${i + 1}-silah"></div></td>
            <td><input type="checkbox" name="opportunity"></td>
          </tr>`).join("")}
      </tbody>
    </table>
  `;

  document.getElementById("person-select").innerHTML =
    puzzle.suspects.map(s => `<option>${s}</option>`).join("");

  document.getElementById("place-select").innerHTML =
    puzzle.locations.map(l => `<option>${l}</option>`).join("");

  document.getElementById("method-select").innerHTML =
    puzzle.weapons.map(w => `<option>${w}</option>`).join("");

}

/********************************************
 * DRAG & DROP
 ********************************************/
document.addEventListener("click", e => {

  if (e.target.classList.contains("draggable")) {

    if (selectedItem) selectedItem.classList.remove("selected");

    selectedItem = e.target;
    selectedItem.classList.add("selected");

  }

  if (
    e.target.classList.contains("drop-zone") &&
    selectedItem &&
    e.target.children.length === 0
  ) {

    selectedItem.parentNode.removeChild(selectedItem);
    e.target.appendChild(selectedItem);
    selectedItem.classList.remove("selected");
    selectedItem = null;

  }

});

/********************************************
 * ONLY ONE OPPORTUNITY CHECKBOX
 ********************************************/
document.addEventListener("change", e => {

  if (e.target.name === "opportunity") {

    document
      .querySelectorAll('input[name="opportunity"]')
      .forEach(cb => (cb.checked = cb === e.target));

  }

});

/********************************************
 * GUESS FORM
 ********************************************/
document.getElementById("guess-form").addEventListener("submit", function (e) {

  e.preventDefault();

  const person = e.target.person.value.trim();
  const place = e.target.place.value.trim();
  const method = e.target.method.value.trim();

  const correct = activePuzzle.solution;

  const isPersonCorrect = person === correct.person;
  const isPlaceCorrect = place === correct.place;
  const isMethodCorrect = method === correct.method;

  if (isPersonCorrect && isPlaceCorrect && isMethodCorrect) {

    localStorage.setItem("result", "success");
    window.location.href = "dedektif_result.html";
    return;

  }

  const feedback = document.getElementById("feedback");

  feedback.innerHTML = `
    😟 Yalnızca bazı parçaları doğru bulabildiniz:<br>
    - <strong>Suçlu:</strong> ${person} ${isPersonCorrect ? "✅" : "❌"}<br>
    - <strong>Olay Yeri:</strong> ${place} ${isPlaceCorrect ? "✅" : "❌"}<br>
    - <strong>Yöntem:</strong> ${method} ${isMethodCorrect ? "✅" : "❌"}<br>
    İpuçlarını tekrar inceleyiniz.
  `;

  const hearts = document.querySelectorAll(".heart");

  if (errors < hearts.length) {
    hearts[errors].style.opacity = "0.2";
    errors++;
  }

  if (errors === hearts.length) {

    localStorage.setItem("result", "fail");
    window.location.href = "dedektif_result.html";

  }

});

</script>
