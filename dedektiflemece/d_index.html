<style>
/* ---------- RESET & BASE ---------- */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #f8f9fb;
  color: #333;
  text-align: center;
}

/* ---------- HEADER ---------- */
header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 12px 16px;              /* ⬅ reduced */
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
}

.center img {
  height: 80px;                    /* ⬅ slightly smaller */
}

/* ===============================
   CARDS GRID (MAIN LAYOUT)
================================ */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
  padding: 30px 6% 40px;
}

/* ===============================
   CARD LINK (FULL CLICK)
================================ */
.card-link {
  display: block;
  text-decoration: none;
  color: inherit;
}

/* ===============================
   CARD
================================ */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 32px 26px 36px;
  box-shadow: 0 8px 26px rgba(0,0,0,0.06);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  text-align: center;

  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card-link:hover .card {
  transform: translateY(-6px);
  box-shadow: 0 14px 36px rgba(0,0,0,0.12);
}

/* ===============================
   CARD CONTENT
================================ */
.card img {
  width: 200px;
  height: 200px;
  object-fit: contain;
  margin-bottom: 20px;
}

.card h3 {
  font-size: 22px;
  margin: 6px 0 12px;
}

.card p {
  font-size: 16px;
  line-height: 1.45;
  color: #666;
  max-width: 260px;
  margin: 0 auto 24px;
}

/* ===============================
   BUTTON (VISUAL ONLY)
================================ */
.btn-card {
  margin-top: auto;
  padding: 12px 26px;
  background: #444;
  color: #fff;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
}

.card-link:hover .btn-card {
  background: #000;
}

/* ===============================
   RESPONSIVE
================================ */
@media (max-width: 768px) {
  .cards {
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  }
}

@media (max-width: 480px) {
  .cards {
    grid-template-columns: 1fr;
    padding: 22px 16px 30px;
  }
}




/* ---------- FOOTER ---------- */
footer {
  margin-top: 30px;
  padding: 18px 10px;
  font-size: 14px;
  color: #777;
}

/* Cookie overlay */
#cookie-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 999;
}

/* Cookie popup box */
#cookie-popup {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  padding: 16px 20px;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  display: none;
  z-index: 1000;
  max-width: 90%;
  width: 360px;
  font-size: 14px;
}

/* Button */
#cookie-popup button {
  margin-top: 10px;
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  background: #2c5cff;
  color: #fff;
  cursor: pointer;
}

#cookie-popup button:hover {
  background: #1f44cc;
}

<!-- Cookie Popup -->
<div id="cookie-popup">
  <p>
    Sitemizde deneyimi iyileştirmek için çerezler kullanıyoruz.
  </p>
  <button id="cookie-accept">Kabul Et</button>
</div>

<script>

  document.addEventListener("DOMContentLoaded", () => {
    loadFooter();    
  });

// Cookie Popup Logic
function initCookiePopup() {
  const popup = document.getElementById("cookie-popup");
  const overlay = document.getElementById("cookie-overlay");
  const acceptBtn = document.getElementById("cookie-accept");

  // If popup elements are not present, do nothing
  if (!popup || !overlay || !acceptBtn) return;

  // Show popup if consent not given
  if (!localStorage.getItem("cookieAccepted")) {
    popup.style.display = "block";
    overlay.style.display = "block";
  }

  // Accept cookies
  acceptBtn.addEventListener("click", () => {
    localStorage.setItem("cookieAccepted", "true");
    popup.style.display = "none";
    overlay.style.display = "none";
  });
}

// Service Worker registration (safe & minimal)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js")
      .catch(err => console.error("Service Worker registration failed:", err));
  });
}

// Initialize after DOM is ready
document.addEventListener("DOMContentLoaded", () => {
  initCookiePopup();
});

</script>
