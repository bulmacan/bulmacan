<! -- Önceki Dedektiflemeceler />
<ul id="puzzle-links" class="puzzle-list">
</ul>


<div id="smart-footer"></div>
<script src="https://www.bulmacan.com/footer/load_footer.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadFooter();
  });
</script>


<script>
  const today = new Date().toISOString().split("T")[0];

  fetch('https://www.bulmacan.com/dedektiflemece/dedektiflemece_json.json')
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById('puzzle-links');
      container.innerHTML = '';

      const puzzles = data.puzzles.filter(p => p.date < today);
      puzzles.sort((a, b) => new Date(b.date) - new Date(a.date));

      puzzles.forEach(puzzle => {
        const li = document.createElement('li');
        const a = document.createElement('a');

        a.href = `past-puzzles_load.html?next=dedektif_past.html&date=${puzzle.date}`;
        a.textContent = `${puzzle.date} tarihli Dedektiflemece`;
        a.className = 'puzzle-link';

        li.appendChild(a);
        container.appendChild(li);
      });

      if (puzzles.length === 0) {
        container.innerHTML = '<li>Henüz önceki bulmaca bulunamadı.</li>';
      }
    })
    .catch(error => {
      document.getElementById('puzzle-links').innerHTML =
        '<li>Bulmacalar yüklenemedi.</li>';
      console.error('JSON yüklenemedi:', error);
    });
</script>

</body>
