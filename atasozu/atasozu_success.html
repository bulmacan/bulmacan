  <!-- 🔧 Dynamic Puzzle Loader -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const date = params.get("date");

    fetch("bul-buldur/atasozu/atasozu_data.json")
      .then(res => {
        if (!res.ok) throw new Error("JSON file not found or inaccessible");
        return res.json();
      })
      .then(data => {
        const puzzle = data.puzzles.find(p => p.date === date);

        if (!puzzle) {
          document.getElementById("emojiClue").textContent = "Seçilen tarih için bulmaca bulunamadı.";
          return;
        }

        document.getElementById("emojiClue").textContent = puzzle.emojiClue;
        document.getElementById("proverbText").textContent = puzzle.correctSequence.join(" ");
      })
      .catch(err => {
        document.getElementById("emojiClue").textContent = "Veri yüklenemedi: " + err.message;
        console.error("Fetch error:", err);
      });
  </script>
