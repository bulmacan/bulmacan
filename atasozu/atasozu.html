<script>

let correctSequence = [];
let selected = [];

const urlParams = new URLSearchParams(window.location.search);
const selectedDate = urlParams.get("date");

async function loadAtasozu() {

  const today = new Date();
  let puzzle = null;

  /* 1️⃣ Try requested date first */
  if (selectedDate) {

    try {

      const res = await fetch(`/atasozu/data/${selectedDate}.json`);

      if (res.ok) {
        puzzle = await res.json();
        console.log("Loaded atasozu:", selectedDate);
      }

    } catch(e){}

  }

  /* 2️⃣ Otherwise search backwards for latest puzzle */
  if (!puzzle) {

    for (let i = 0; i < 3650; i++) {

      const d = new Date(today);
      d.setDate(today.getDate() - i);

      const dateStr = d.toISOString().split("T")[0];

      try {

        const res = await fetch(`/atasozu/data/${dateStr}.json`);

        if (res.ok) {

          puzzle = await res.json();
          console.log("Loaded fallback atasozu:", dateStr);
          break;

        }

      } catch(e){}

    }

  }

  if (!puzzle) {

    document.getElementById("emojiClue").textContent = "Bulmaca bulunamadı.";
    return;

  }

  correctSequence = puzzle.correctSequence;
  document.getElementById("emojiClue").textContent = puzzle.emojiClue;

  const grid = document.getElementById("wordGrid");
  grid.innerHTML = "";

  puzzle.wordGrid.forEach(word => {

    const div = document.createElement("div");
    div.className = "word";
    div.textContent = word;

    grid.appendChild(div);

  });

}

loadAtasozu();

/* ===============================
   Game logic
================================ */

const grid = document.getElementById("wordGrid");

grid.addEventListener("click", function (e) {

  if (e.target.classList.contains("word")) {

    const wordElement = e.target;

    if (wordElement.classList.contains("selected")) {

      wordElement.classList.remove("selected", "wrong-red", "wrong-amber");
      selected = selected.filter(el => el !== wordElement);

    } else {

      if (selected.length >= correctSequence.length) {

        selected.forEach(el => el.classList.remove("selected", "wrong-red", "wrong-amber"));
        selected = [];

      }

      wordElement.classList.add("selected");
      selected.push(wordElement);

    }

    const selectedWords = selected.map(el => el.textContent.trim());

    document.getElementById("selectedWords").textContent =
      "Çözüm: " + selectedWords.join(" ");

    selected.forEach(el => el.classList.remove("wrong-red", "wrong-amber"));

    selected.forEach((el, i) => {

      const word = el.textContent.trim();

      if (correctSequence[i] === word) {

      } else if (correctSequence.includes(word)) {

        el.classList.add("wrong-amber");

      } else {

        el.classList.add("wrong-red");

      }

    });

    if (selectedWords.join(" ") === correctSequence.join(" ")) {

      grid.style.display = "none";
      document.getElementById("successMessage").style.display = "block";

    }

  }

});

</script>
