<!-- PUZZLE LOADER -->

<script>

let puzzleID = null;

const urlParams = new URLSearchParams(window.location.search);
const selectedDate = urlParams.get("date");

async function loadPuzzle(){

const today = new Date();
let puzzle = null;

if(selectedDate){

try{

const res = await fetch(`/kumelemece/data/${selectedDate}.json`);

if(res.ok){
puzzle = await res.json();
}

}catch(e){}

}

if(!puzzle){

for(let i=0;i<3650;i++){

const d = new Date(today);
d.setDate(today.getDate()-i);

const dateStr = d.toISOString().split("T")[0];

try{

const res = await fetch(`/kumelemece/data/${dateStr}.json`);

if(res.ok){
puzzle = await res.json();
break;
}

}catch(e){}

}

}

if(!puzzle){

document.getElementById("group-results").innerHTML =
"<p>Bugüne ait grup verileri bulunamadı.</p>";

return;

}

/* store puzzle id */

puzzleID = puzzle.id;

console.log("Loaded puzzle ID:", puzzleID);

const container = document.getElementById("group-results");

puzzle.groups.forEach((group,index)=>{

const wordBoxes = group.words
.map(word=>`<span class="word-highlight">${word}</span>`)
.join("");

const html = `
<div class="group-block">
  <div class="group-row">
    ${wordBoxes}
    <span class="group-label"> → ${group.label}</span>
  </div>
</div>
`;

container.innerHTML += html;

});

}

loadPuzzle();

</script>


<!-- RATING SYSTEM -->

<script>

const button = document.getElementById("submit-rating");

star.addEventListener("click", () => {

selectedRating = index + 1;

stars.forEach(s => s.classList.remove("active"));

for(let i=0;i<selectedRating;i++){
stars[i].classList.add("active");
