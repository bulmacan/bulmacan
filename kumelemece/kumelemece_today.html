<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>bulmacan – Kümelemece</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kümelemece – Günlük ve haftalık bulmacalar. Grupları doğru şekilde eşleştir, zekanı sınırla!">

  <!-- CSS -->
  <link rel="stylesheet" href="https://www.bulmacan.com/kumelemece/css_js/kumelemece_css.css">
  <link rel="stylesheet" href="https://www.bulmacan.com/footer/footer.css">

  <!-- Favicons -->
  <link rel="icon" href="../icons/favicon.ico">
  <link rel="manifest" href="/icons/site.webmanifest">

  <!-- Scripts (non-blocking) -->
  <script src="https://www.bulmacan.com/header/load_header.js" defer></script>
  <script src="https://www.bulmacan.com/footer/load_footer.js" defer></script>
  <script src="css_js/kumelemece_js.js" defer></script>

  <!-- Cloudflare -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
    data-cf-beacon='{"token": "6ed43d34957a49fcb90ec8e43f7db523"}'>
  </script>
</head>

<body>

  <!-- Header -->
  <div id="smart-header"></div>

  <!-- Game UI -->
  <div id="game-ui">

    <div id="timer">⏱️ Süre: 10:00</div>

    <div class="countdown-container">
      <div class="count-box filled"></div>
      <div class="count-box filled"></div>
      <div class="count-box filled"></div>
      <div class="count-box filled"></div>
      <div class="count-box filled"></div>
    </div>

    <div id="puzzle-title" class="puzzle-title"></div>

    <!-- Instant feedback -->
    <div id="puzzle-grid">Yükleniyor...</div>

    <button id="restart-btn" style="display:none;">🔄 Oyunu Yeniden Başlat</button>

    <div id="feedback"></div>
    <div id="hint-boxes"></div>

  </div>

  <!-- Fallback -->
  <div id="no-puzzle" style="display:none; margin-top:20px; font-weight:bold;">
    Bulmaca bulunamadı.
  </div>

  <!-- Footer -->
  <div id="smart-footer"></div>

  <!-- MAIN LOGIC -->
  <script>
    const dataPath = "data/";
    const archivePath = "pastgames/archive_index.json";

    const urlParams = new URLSearchParams(window.location.search);
    const selectedDate = urlParams.get("date");

    async function fetchJSON(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error("Fetch failed: " + path);
      return await res.json();
    }

    async function loadPuzzle() {
      try {
        let dateToLoad;

        // 1. If user selected a date
        if (selectedDate) {
          dateToLoad = selectedDate;
        } else {
          // 2. Load archive index (FAST)
          const archive = await fetchJSON(archivePath);

          if (!archive || archive.length === 0) {
            throw new Error("Archive empty");
          }

          // Supports BOTH formats:
          // ["2026-04-10"] OR [{date:"2026-04-10"}]
          dateToLoad = archive[0].date || archive[0];
        }

        // 3. Load puzzle
        const puzzle = await fetchJSON(`${dataPath}${dateToLoad}.json`);

        // Hide fallback
        document.getElementById("no-puzzle").style.display = "none";

        // Setup puzzle data
        window.correctGroups = puzzle.groups;
        window.hintMessages = puzzle.groups.map(g => ({
          text: g.clue,
          label: g.label
        }));

        // Result navigation
        window.showResults = function(type) {
          const target = type === "success"
            ? "kumelemece_success_today.html"
            : "kumelemece_timeout_today.html";
          window.location.href = target;
        };

        // Create hint boxes
        const hintContainer = document.getElementById("hint-boxes");
        hintContainer.innerHTML = "";

        puzzle.groups.forEach(() => {
          const box = document.createElement("div");
          box.className = "hint-box";
          box.textContent = "❓İpucu Göster";
          hintContainer.appendChild(box);
        });

        // Render puzzle (handled in your JS file)
        if (typeof renderPuzzle === "function") {
          renderPuzzle(puzzle);
        } else {
          console.warn("renderPuzzle not found");
        }

      } catch (err) {
        console.error("Load error:", err);

        document.getElementById("game-ui").style.display = "none";
        document.getElementById("no-puzzle").style.display = "block";
        document.getElementById("no-puzzle").textContent = "Bulmaca yüklenemedi.";
      }
    }

    // Start everything together (FAST)
    document.addEventListener("DOMContentLoaded", () => {
      try {
        loadHeader("home");
        loadFooter();
      } catch (e) {
        console.warn("Header/Footer error:", e);
      }

      loadPuzzle();
    });
  </script>

</body>
</html>
