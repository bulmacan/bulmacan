<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>bulmacan – Kümelemece</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/kumelemece/css_js/kumelemece_css.css">
  <link rel="stylesheet" href="/footer/footer.css">

  <script src="/header/load_header.js" defer></script>
  <script src="/footer/load_footer.js" defer></script>
  <script src="/kumelemece/css_js/kumelemece_js.js" defer></script>
</head>

<body>

<div id="smart-header"></div>

<div id="game-ui">
  <div id="timer">⏱️ Süre: 10:00</div>

  <div class="countdown-container">
    <div class="count-box filled"></div>
    <div class="count-box filled"></div>
    <div class="count-box filled"></div>
    <div class="count-box filled"></div>
    <div class="count-box filled"></div>
  </div>

  <div id="puzzle-title" class="puzzle-title"></div>
  <div id="puzzle-grid">Yükleniyor...</div>

  <button id="restart-btn" style="display:none;">🔄 Oyunu Yeniden Başlat</button>
  <div id="feedback"></div>
  <div id="hint-boxes"></div>
</div>

<div id="no-puzzle" style="display:none; margin-top:20px; font-weight:bold;">
  Bugünün bulmacası bulunamadı.
</div>

<div id="smart-footer"></div>

<script>
function getToday() {
  const d = new Date();
  return d.toISOString().split("T")[0];
}

async function loadPuzzle() {
  const dateToLoad = getToday();

  // SIMPLE, SAME-AS-BEFORE STYLE PATH
  const url = "data/" + dateToLoad + ".json";

  console.log("Fetching:", url);

  try {
    const res = await fetch(url);

    if (!res.ok) throw new Error("No puzzle");

    const puzzle = await res.json();

    window.correctGroups = puzzle.groups;
    window.hintMessages = puzzle.groups.map(g => ({
      text: g.clue,
      label: g.label
    }));

    window.showResults = function(type) {
      window.location.href = type === "success"
        ? "kumelemece_success_today.html"
        : "kumelemece_timeout_today.html";
    };

    const hintContainer = document.getElementById("hint-boxes");
    hintContainer.innerHTML = "";

    puzzle.groups.forEach(() => {
      const box = document.createElement("div");
      box.className = "hint-box";
      box.textContent = "❓İpucu Göster";
      hintContainer.appendChild(box);
    });

    if (typeof renderPuzzle === "function") {
      renderPuzzle(puzzle);
    }

  } catch (err) {
    console.error("Puzzle load failed:", err);
    document.getElementById("game-ui").style.display = "none";
    document.getElementById("no-puzzle").style.display = "block";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  try {
    loadHeader("home");
    loadFooter();
  } catch {}

  loadPuzzle();
});
</script>

</body>
</html>
