<script>
/********************************************
 *  KUMELEMECÉ RESULT PAGE LOADER
 *  Works with /kumelemece/data/YYYY-MM-DD.json
 ********************************************/

const urlParams = new URLSearchParams(window.location.search);

// Try to read ?date=YYYY-MM-DD
const selectedDate = urlParams.get("date");

console.log("Result page selected date:", selectedDate);

async function loadPuzzle() {

  const today = new Date();
  let puzzle = null;

  /* 1️⃣ Try to load the requested puzzle date */
  if (selectedDate) {
    try {

      const res = await fetch(`/kumelemece/data/${selectedDate}.json`);

      if (res.ok) {
        puzzle = await res.json();
        console.log("Loaded puzzle:", selectedDate);
      }

    } catch (e) {
      console.warn("Requested puzzle not found:", selectedDate);
    }
  }

  /* 2️⃣ Fallback: search backwards for latest puzzle */
  if (!puzzle) {

    for (let i = 0; i < 3650; i++) {

      const d = new Date(today);
      d.setDate(today.getDate() - i);

      const dateStr = d.toISOString().split("T")[0];

      try {

        const res = await fetch(`/kumelemece/data/${dateStr}.json`);

        if (res.ok) {

          puzzle = await res.json();
          console.log("Loaded fallback puzzle:", dateStr);
          break;

        }

      } catch (e) {}

    }
  }

  /* 3️⃣ If still nothing found */
  if (!puzzle || !puzzle.groups) {

    document.getElementById("group-results").innerHTML =
      "<p>Bugüne ait grup verileri bulunamadı.</p>";

    return;

  }

  /* 4️⃣ Render puzzle groups */

  const container = document.getElementById("group-results");

  puzzle.groups.forEach((group, index) => {

    const colorClass = group.class || `highlight-${index + 1}`;

    const wordBoxes = group.words
      .map(word => `<span class="word-highlight ${colorClass}">${word}</span>`)
      .join("");

    const html = `
      <div class="group-block">
        <div class="group-line">
          <div class="group-row">${wordBoxes}</div>
          <div class="group-label">→ ${group.label}</div>
        </div>
      </div>
    `;

    container.innerHTML += html;

  });

}

loadPuzzle().catch(err => {
  console.error("Puzzle load error:", err);
  document.getElementById("group-results").innerHTML =
    "<p>Grup verileri yüklenemedi.</p>";
});

</script>
