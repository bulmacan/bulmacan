<body>

  <!-- 🔺 Smart Header -->
<div id="smart-header"></div>
<script src="https://www.bulmacan.com/header/load_header.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadHeader("docs");
  });
</script>

  <main class="contact-wrapper">
    <section class="contact-header">
      <h3>Bize Ulaşın</h3>
      Tüm önerileriniz için, teknik sorunları bildirmek ya da sadece bir “Merhaba” demek için aşağıdaki formu kullanabilirsiniz.
    </section>

    <section class="contact-form">
      <form id="emailform" action="https://formspree.io/f/xjgawjbv" method="POST">
        <label for="name">Adınız</label>
        <input type="text" id="name" name="name" required />

        <label for="email">E-posta Adresiniz</label>
        <input type="email" id="email" name="_replyto" required />

        <label for="message">Mesajınız</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <input type="hidden" name="_subject" value="Yeni mesaj – bulmacan İletişim" />
        <button type="submit">Gönder</button>
      </form>
    </section>
  </main>


<div id="smart-footer"></div>
<link rel="stylesheet" href="https://www.bulmacan.com/footer/footer.css">
<script src="https://www.bulmacan.com/footer/load_footer.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadFooter();
  });
</script>

<script>
  document.getElementById('emailform').addEventListener('submit', function(event) {
    event.preventDefault();

    const form = event.target;
    const data = new FormData(form);

    fetch(form.action, {
      method: 'POST',
      body: data,
      headers: {
        'Accept': 'application/json'
      }
    }).then(response => {
      if (response.ok) {
        // Fade out the contact header
        const header = document.querySelector('.contact-header');
        if (header) {
          header.style.transition = 'opacity 0.5s ease';
          header.style.opacity = '0';
          setTimeout(() => {
            header.style.display = 'none';
          }, 500);
        }

        // Replace form with thank-you message
        form.innerHTML = `
          <p style="font-size: 1.2em; color: #333; text-align: center;">
            Teşekkürler! Mesajınız bize ulaştı.<br>
            Genellikle 24 saat içinde yanıt vermeye çalışıyoruz.<br>

          </p>
        `;

      } else {
        alert('Bir şeyler yanlış gitti. Lütfen tekrar deneyin.');
      }
    });
  });
</script>

</body>
