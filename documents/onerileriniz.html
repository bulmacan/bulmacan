<main class="contact-wrapper">

  <!-- PAGE TITLE -->

  </section>

  <!-- FORM -->
  <section class="contact-form">
    <form id="poeticForm" action="https://formspree.io/f/xwpwykld" method="POST">


<table class="suggestion-table">
  <thead>

  </thead>
  <tbody>

</main>

<!-- FORM SUBMISSION SCRIPT -->
<script>
  document.getElementById('poeticForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const form = event.target;
    const data = new FormData(form);

    fetch(form.action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    }).then(response => {
      if (response.ok) {

        const header = document.querySelector('.contact-header');
        if (header) {
          header.style.transition = 'opacity 0.5s ease';
          header.style.opacity = '0';
          setTimeout(() => { header.style.display = 'none'; }, 500);
        }

        form.innerHTML = `
          <p style="font-size: 1.2em; color: #333; text-align: center;">
            Teşekkürler! Öneriniz bize ulaştı.<br>
            Genellikle 24 saat içinde yanıt veriyoruz.<br>
          </p>
        `;

      } else {
        alert('Bir şeyler yanlış gitti. Lütfen tekrar deneyin.');
      }
    });
  });
</script>

</body>
