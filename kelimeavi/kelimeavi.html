<body>


<div id="smart-header"></div>
<script src="https://www.bulmacan.com/header/load_header.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadHeader("home");
  });
</script>

<h1 id="pageTitle">Kelime Avı</h1>
<p id="pageDescription">Günlük kelime avı bulmacasında gizli kelimeleri bulun.</p>

<div id="subject">🧩 Konu: <strong id="puzzleTitle">Yükleniyor...</strong></div>
<div id="progress">0 / 0 bulundu</div>

<div id="game-container">
  <div id="grid"></div>
</div>

<div id="success-screen" style="display:none;">
  <div class="success-message">🎉 Tüm kelimeleri buldunuz!</div>
  <ul id="word-list"></ul>
  <div id="nav-links" style="margin-top:20px;"></div>
</div>

<script>

/* ==============================
   DATE HANDLING (combined)
================================ */
function getDate() {
  const pathParts = window.location.pathname.split("/").filter(Boolean);
  const last = pathParts[pathParts.length - 1];

  if (/^\d{4}-\d{2}-\d{2}$/.test(last)) return last;

  const params = new URLSearchParams(window.location.search);
  return params.get("date");
}

let selectedDate = getDate();
if (!selectedDate) {
  selectedDate = new Date().toISOString().split("T")[0];
}

/* ==============================
   LOAD PUZZLE
================================ */
async function loadPuzzle() {

  let data = null;
  let usedDate = selectedDate;

  // Try selected date
  try {
    const res = await fetch(`data/${selectedDate}.json`);
    if (res.ok) data = await res.json();
  } catch(e){}

  // Fallback search
  if (!data) {
    for (let i = 0; i < 365; i++) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const dateStr = d.toISOString().split("T")[0];

      try {
        const res = await fetch(`data/${dateStr}.json`);
        if (res.ok) {
          data = await res.json();
          usedDate = dateStr;
          break;
        }
      } catch(e){}
    }
  }

  if (!data) {
    document.getElementById("puzzleTitle").textContent = "Bulmaca bulunamadı";
    return;
  }

  document.getElementById("puzzleTitle").textContent = data.title;
  document.getElementById("progress").textContent = `0 / ${data.words.length} bulundu`;

  initializePuzzle(data.matrix, data.words);
  createNavLinks(usedDate);
}

loadPuzzle();

/* ==============================
   PUZZLE ENGINE (merged + robust)
================================ */
function initializePuzzle(matrix, words) {

  const grid = document.getElementById("grid");
  const size = matrix.length;

  let selected = [];
  const usedCells = new Set();
  const found = new Set();

  grid.innerHTML = "";

  matrix.forEach((row, r) => {
    row.forEach((letter, c) => {

      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = letter;

      cell.addEventListener("click", () => {

        const key = `${r},${c}`;

        if (usedCells.has(key)) return;

        if (selected.includes(key)) {
          selected = selected.filter(k => k !== key);
          cell.classList.remove("selected");
        } else {
          selected.push(key);
          cell.classList.add("selected");
        }

        const word = selected.map(k => {
          const [rr, cc] = k.split(",").map(Number);
          return matrix[rr][cc];
        }).join("");

        if (words.includes(word) && isAdjacent(selected) && !found.has(word)) {
          markFound(word);
        }

      });

      grid.appendChild(cell);
    });
  });

  function isAdjacent(cells) {
    for (let i = 1; i < cells.length; i++) {
      const [r1, c1] = cells[i-1].split(",").map(Number);
      const [r2, c2] = cells[i].split(",").map(Number);

      if (Math.abs(r1 - r2) > 1 || Math.abs(c1 - c2) > 1) {
        return false;
      }
    }
    return true;
  }

  function markFound(word) {

    selected.forEach(k => {
      usedCells.add(k);
      const [r, c] = k.split(",").map(Number);
      grid.children[r * size + c].classList.add("found");
      grid.children[r * size + c].classList.remove("selected");
    });

    const li = document.createElement("li");
    li.textContent = word;
    document.getElementById("word-list").appendChild(li);

    found.add(word);
    selected = [];

    document.getElementById("progress").textContent = `${found.size} / ${words.length} bulundu`;

    if (found.size === words.length) {
      document.getElementById("game-container").style.display = "none";
      document.getElementById("success-screen").style.display = "block";
    }
  }
}

/* ==============================
   NAVIGATION
================================ */
async function findValidDate(startDate, direction) {
  for (let i = 1; i <= 7; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + (direction * i));
    const dateStr = d.toISOString().split("T")[0];

    try {
      const res = await fetch(`data/${dateStr}.json`);
      if (res.ok) return dateStr;
    } catch(e){}
  }
  return null;
}

async function createNavLinks(currentDateStr) {

  const currentDate = new Date(currentDateStr);

  const prev = await findValidDate(currentDate, -1);
  const next = await findValidDate(currentDate, 1);

  let html = "";

  if (prev) html += `<a href="?date=${prev}">← Önceki</a>`;
  if (prev && next) html += " | ";
  if (next) html += `<a href="?date=${next}">Sonraki →</a>`;

  document.getElementById("nav-links").innerHTML = html;
}

</script>
