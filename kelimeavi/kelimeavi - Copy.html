  <!-- 🧠 Puzzle Logic -->
<script>

/* ===============================
   Global state
================================ */

let foundWords = 0;
let totalWords = 0;
let puzzle = null;

const urlParams = new URLSearchParams(window.location.search);
const selectedDate = urlParams.get("date");

/* ===============================
   Load Kelime Avı puzzle
================================ */

async function loadKelimeAvi() {

  const today = new Date();
  let data = null;

  /* Try URL date first */
  if (selectedDate) {

    try {
      const res = await fetch(`/kelimeavi/data/${selectedDate}.json`);
      if (res.ok) data = await res.json();
    } catch(e){}

  }

  /* Search backwards for nearest puzzle */
  if (!data) {

    for (let i = 0; i < 3650; i++) {

      const d = new Date(today);
      d.setDate(today.getDate() - i);

      const dateStr = d.toISOString().split("T")[0];

      try {

        const res = await fetch(`/kelimeavi/data/${dateStr}.json`);

        if (res.ok) {

          data = await res.json();
          console.log("Loaded fallback kelimeavi:", dateStr);
          break;

        }

      } catch(e){}

    }

  }

  if (!data) {

    document.getElementById("puzzleTitle").textContent =
      "Hiç bulmaca bulunamadı.";

    return;

  }

  puzzle = data;

  document.getElementById("puzzleTitle").textContent = puzzle.title;

  const matrix = puzzle.matrix;
  const words = puzzle.words;

  totalWords = words.length;

  initializePuzzle(matrix, words);

}

loadKelimeAvi();

/* ===============================
   Puzzle Engine
================================ */

function initializePuzzle(matrix, words) {

  const grid = document.getElementById("grid");
  const gridSize = matrix.length;

  let selectedCells = [];
  const usedCells = new Set();
  const foundSet = new Set();

  grid.innerHTML = "";

  matrix.forEach((row, r) => {

    row.forEach((letter, c) => {

      const cell = document.createElement("div");

      cell.className = "cell";
      cell.textContent = letter;
      cell.dataset.key = `${r},${c}`;

      grid.appendChild(cell);

      cell.addEventListener("click", () => handleCellClick(cell, r, c));

    });

  });

  function handleCellClick(cell, r, c) {

    const key = `${r},${c}`;

    if (usedCells.has(key)) return;

    if (selectedCells.includes(key)) {

      cell.classList.remove("selected");
      selectedCells = selectedCells.filter(k => k !== key);

    } else {

      cell.classList.add("selected");
      selectedCells.push(key);

    }

    const selectedLetters = selectedCells.map(k => {

      const [row, col] = k.split(",").map(Number);
      return matrix[row][col];

    }).join("");

    const match = words.find(w => w === selectedLetters);

    if (match && isAdjacentPath(selectedCells)) {

      markWordFound(match);

    }

  }

  function isAdjacentPath(cells) {

    for (let i = 1; i < cells.length; i++) {

      const [r1, c1] = cells[i-1].split(",").map(Number);
      const [r2, c2] = cells[i].split(",").map(Number);

      const rowDiff = Math.abs(r1 - r2);
      const colDiff = Math.abs(c1 - c2);

      if (rowDiff > 1 || colDiff > 1) return false;

    }

    return true;

  }

  function markWordFound(word) {

    selectedCells.forEach(key => {

      usedCells.add(key);

      const [r, c] = key.split(",").map(Number);
      const index = r * gridSize + c;

      grid.children[index].classList.remove("selected");
      grid.children[index].classList.add("found");

    });

    foundSet.add(word);
    foundWords++;

    document.getElementById("progress").textContent =
      `${foundWords} / ${words.length} bulundu`;

    selectedCells = [];

    if (foundSet.size === words.length) {

      document.getElementById("game-container").style.display = "none";
      document.getElementById("success-screen").style.display = "block";

    }

  }

}

</script>
